<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Tag Generator — TradeFlow NG</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/2.8.0/dom-to-image-more.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F5F2EB;color:#1C1C1C;min-height:100vh;-webkit-font-smoothing:antialiased;}
header{background:#0D1F14;padding:1.3rem 2rem;display:flex;align-items:center;gap:.75rem;}
.hmark{width:36px;height:36px;background:#1A6B3C;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.hname{font-size:1rem;font-weight:700;color:#fff;}
.hbadge{margin-left:auto;font-size:.7rem;font-weight:700;color:#3AB069;background:rgba(58,176,105,.12);border:1px solid rgba(58,176,105,.25);padding:.25rem .75rem;border-radius:100px;text-transform:uppercase;letter-spacing:.05em;}
main{max-width:900px;margin:0 auto;padding:3rem 2rem 5rem;display:grid;grid-template-columns:300px 1fr;gap:3rem;align-items:start;}
@media(max-width:680px){main{grid-template-columns:1fr;}}
.plbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#6B7A70;margin-bottom:1.4rem;}
.fg{margin-bottom:1.1rem;}
label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.38rem;}
input,select{width:100%;padding:.78rem .95rem;border:1.5px solid rgba(26,107,60,.16);border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;color:#1C1C1C;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus{border-color:#1A6B3C;box-shadow:0 0 0 3px rgba(26,107,60,.08);}
input::placeholder{color:#B5BDB9;}
.hint{font-size:.72rem;color:#6B7A70;margin-top:.28rem;}
.bgen{width:100%;margin-top:.4rem;padding:.88rem;background:#1A6B3C;color:#fff;border:none;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;}
.bgen:hover{background:#2E8B57;transform:translateY(-1px);}
.bdl{width:100%;margin-top:.7rem;padding:.82rem;background:transparent;color:#1A6B3C;border:1.5px solid #1A6B3C;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;display:none;}
.bdl:hover{background:#1A6B3C;color:#fff;}
.bdl:disabled{opacity:.6;cursor:not-allowed;}
.pwrap{background:#fff;border:1px solid rgba(26,107,60,.14);border-radius:14px;padding:2rem;display:flex;justify-content:center;align-items:center;min-height:260px;box-shadow:0 4px 20px rgba(0,0,0,.05);}
.est{text-align:center;color:#6B7A70;font-size:.86rem;line-height:1.65;}
.est .ei{font-size:2rem;display:block;margin-bottom:.5rem;}

/* ── TAG: zero CSS variables, all hex ── */
#tag{
  width:300px;
  background:#ffffff;
  border-radius:12px;
  overflow:hidden;
  font-family:'Plus Jakarta Sans',sans-serif;
  box-shadow:0 8px 28px rgba(0,0,0,.13);
  display:none;
}
#tag.show{display:block;}
.th{background:#1A6B3C;padding:1.1rem 1.3rem 1rem;}
.tbrand{display:flex;align-items:center;gap:.5rem;}
.tmark{width:28px;height:28px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.tname{font-size:.95rem;font-weight:800;color:#ffffff;letter-spacing:-.02em;}
.tname small{font-weight:500;color:rgba(255,255,255,.6);}
.trole{display:inline-block;margin-top:.65rem;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);color:#ffffff;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .55rem;border-radius:100px;}
.tb{padding:1.1rem 1.3rem;}
.thn{font-size:1.2rem;font-weight:800;color:#0D1F14;letter-spacing:-.02em;line-height:1.15;margin-bottom:.2rem;}
.tmkt{font-size:.78rem;color:#6B7A70;font-weight:500;margin-bottom:.9rem;}
.tdiv{height:1px;background:rgba(26,107,60,.12);margin-bottom:.9rem;}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.3rem;}
.tl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6B7A70;margin-bottom:.12rem;}
.tv{font-size:.8rem;font-weight:600;color:#1C1C1C;font-family:'DM Mono',monospace;}
.tv.gr{color:#1A6B3C;font-weight:700;}
.tfoot{background:#F9FBF9;border-top:1px solid rgba(26,107,60,.1);padding:.65rem 1.3rem;display:flex;align-items:center;justify-content:space-between;}
.ttag{font-size:.6rem;font-weight:600;font-style:italic;color:#1A6B3C;}
.tweb{font-size:.58rem;color:#6B7A70;font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<header>
  <div class="hmark">🌾</div>
  <span class="hname">TradeFlow NG</span>
  <span class="hbadge">Agent Tag Generator</span>
</header>
<main>
  <div>
    <div class="plbl">Agent Details</div>
    <div class="fg"><label>Full Name *</label><input type="text" id="fn" placeholder="e.g. Aminu Bello" maxlength="40"></div>
    <div class="fg"><label>Agent ID *</label><input type="text" id="fi" placeholder="e.g. TFN-KW-001" maxlength="20"><p class="hint">Format: TFN-[State Code]-[Number]</p></div>
    <div class="fg">
      <label>State</label>
      <select id="fs"><option value="">Select state</option><option>Lagos</option><option>Oyo</option><option>Ogun</option><option>Kwara</option><option>Kogi</option><option>Abuja (FCT)</option><option>Nasarawa</option><option>Niger</option></select>
    </div>
    <div class="fg"><label>Assigned Market *</label><input type="text" id="fm" placeholder="e.g. Bodija Market, Ibadan" maxlength="50"></div>
    <div class="fg"><label>Phone Number *</label><input type="tel" id="fp" placeholder="e.g. 08012345678" maxlength="14"></div>
    <div class="fg"><label>Role</label><select id="fr"><option>Market Agent</option><option>State Coordinator</option><option>Spot Reporter</option></select></div>
    <div class="fg"><label>Issue Date</label><input type="date" id="fd"></div>
    <button class="bgen" onclick="gen()">Generate Tag →</button>
    <button class="bdl" id="bdl" onclick="dl()">⬇ Download PNG</button>
  </div>
  <div>
    <div class="plbl">Preview</div>
    <div class="pwrap">
      <div class="est" id="est"><span class="ei">🪪</span>Fill the details and click<br>Generate Tag</div>
      <div id="tag">
        <div class="th">
          <div class="tbrand">
            <div class="tmark">🌾</div>
            <div class="tname">TradeFlow <small>NG</small></div>
          </div>
          <div class="trole" id="or">Market Agent</div>
        </div>
        <div class="tb">
          <div class="thn" id="on">—</div>
          <div class="tmkt" id="om">📍 —</div>
          <div class="tdiv"></div>
          <div class="tgrid">
            <div><div class="tl">Agent ID</div><div class="tv gr" id="oi">—</div></div>
            <div><div class="tl">State</div><div class="tv" id="os">—</div></div>
            <div><div class="tl">Phone</div><div class="tv" id="op">—</div></div>
            <div><div class="tl">Issued</div><div class="tv" id="od">—</div></div>
          </div>
        </div>
        <div class="tfoot">
          <span class="ttag">Flowing Trade. Feeding Nigeria.</span>
          <span class="tweb">tradeflowng.com</span>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
document.getElementById('fd').value = new Date().toISOString().split('T')[0];

function gen(){
  const name=document.getElementById('fn').value.trim();
  const id=document.getElementById('fi').value.trim();
  const mkt=document.getElementById('fm').value.trim();
  const ph=document.getElementById('fp').value.trim();
  const st=document.getElementById('fs').value;
  const role=document.getElementById('fr').value;
  const dt=document.getElementById('fd').value;
  if(!name||!id||!mkt||!ph){alert('Please fill Name, Agent ID, Market and Phone.');return;}
  document.getElementById('on').textContent=name;
  document.getElementById('oi').textContent=id;
  document.getElementById('om').textContent='📍 '+mkt;
  document.getElementById('op').textContent=ph;
  document.getElementById('os').textContent=st||'—';
  document.getElementById('or').textContent=role;
  document.getElementById('od').textContent=dt?new Date(dt+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
  document.getElementById('est').style.display='none';
  document.getElementById('tag').classList.add('show');
  document.getElementById('bdl').style.display='block';
}

function dl(){
  const el=document.getElementById('tag');
  const name=document.getElementById('fn').value.trim()||'agent';
  const id=document.getElementById('fi').value.trim()||'tag';
  const btn=document.getElementById('bdl');
  btn.textContent='Generating…'; btn.disabled=true;
  domtoimage.toPng(el,{quality:1,bgcolor:'#ffffff',width:el.offsetWidth,height:el.offsetHeight})
  .then(url=>{
    const a=document.createElement('a');
    a.href=url;
    a.download='TFN_Tag_'+id+'_'+name.replace(/\s+/g,'-')+'.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    btn.textContent='⬇ Download PNG'; btn.disabled=false;
  }).catch(e=>{
    console.error(e);
    alert('Download failed. Please use Chrome or Edge.');
    btn.textContent='⬇ Download PNG'; btn.disabled=false;
  });
}
document.querySelectorAll('input,select').forEach(el=>{el.addEventListener('keydown',e=>{if(e.key==='Enter')gen();});});
</script>
</body>
</html>
