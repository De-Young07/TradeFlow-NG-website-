<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Tag Generator — TradeFlow NG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:   #1A6B3C;
    --green2:  #2E8B57;
    --glow:    #3AB069;
    --amber:   #C8860A;
    --cream:   #F5F2EB;
    --dark:    #0D1F14;
    --text:    #1C1C1C;
    --muted:   #6B7A70;
    --border:  rgba(26,107,60,0.14);
    --white:   #FFFFFF;
    --font:    'Plus Jakarta Sans', sans-serif;
    --mono:    'DM Mono', monospace;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ───────────────────────────────── */
  header {
    background: var(--dark);
    padding: 1.4rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .logo-mark {
    width: 38px; height: 38px;
    background: var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }
  .logo-text {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .logo-tag {
    margin-left: auto;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--glow);
    background: rgba(58,176,105,0.12);
    border: 1px solid rgba(58,176,105,0.25);
    padding: 0.25rem 0.7rem;
    border-radius: 100px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── Layout ───────────────────────────────── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 3rem 2rem 5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: start;
  }
  @media(max-width: 720px) {
    main { grid-template-columns: 1fr; padding: 2rem 1.2rem; }
  }

  /* ── Form panel ───────────────────────────── */
  .panel-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .form-group {
    margin-bottom: 1.3rem;
  }
  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.45rem;
  }
  input, select {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: var(--font);
    font-size: 0.92rem;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, select:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(26,107,60,0.08);
  }
  input::placeholder { color: #B0BAB5; }

  .input-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.35rem;
  }

  .btn-generate {
    width: 100%;
    margin-top: 0.5rem;
    padding: 0.95rem;
    background: var(--green);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.01em;
  }
  .btn-generate:hover {
    background: var(--green2);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(26,107,60,0.25);
  }

  .btn-download {
    width: 100%;
    margin-top: 0.8rem;
    padding: 0.85rem;
    background: transparent;
    color: var(--green);
    border: 1.5px solid var(--green);
    border-radius: 10px;
    font-family: var(--font);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .btn-download:hover {
    background: var(--green);
    color: var(--white);
  }
  .btn-download.visible { display: block; }

  /* ── Preview panel ────────────────────────── */
  .preview-panel {
    position: sticky;
    top: 2rem;
  }

  .preview-wrap {
    display: flex;
    justify-content: center;
    padding: 2rem;
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    min-height: 280px;
    align-items: center;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.88rem;
    line-height: 1.6;
  }
  .empty-state .icon { font-size: 2rem; margin-bottom: 0.6rem; }

  /* ══ THE TAG ══════════════════════════════════ */
  #agent-tag {
    width: 320px;
    background: var(--white);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.14);
    font-family: var(--font);
    display: none;
    position: relative;
  }
  #agent-tag.visible { display: block; }

  /* Top green band */
  .tag-header {
    background: var(--green);
    padding: 1.2rem 1.4rem 1rem;
    position: relative;
    overflow: hidden;
  }
  .tag-header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .tag-header::after {
    content: '';
    position: absolute;
    bottom: -40px; right: 10px;
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .tag-brand {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    position: relative;
    z-index: 1;
  }
  .tag-logo-mark {
    width: 30px; height: 30px;
    background: rgba(255,255,255,0.15);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .tag-brand-name {
    font-size: 1rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .tag-brand-name span {
    color: rgba(255,255,255,0.6);
    font-weight: 500;
  }

  .tag-role-badge {
    display: inline-block;
    margin-top: 0.7rem;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--white);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    position: relative; z-index: 1;
  }

  /* Body */
  .tag-body {
    padding: 1.2rem 1.4rem;
  }

  .tag-name {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--dark);
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 0.25rem;
  }

  .tag-market {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .tag-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
    margin-bottom: 1rem;
  }

  .tag-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
    margin-bottom: 1rem;
  }

  .tag-detail-item {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .tag-detail-label {
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .tag-detail-value {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--dark);
    font-family: var(--mono);
  }

  .tag-detail-value.id-value {
    font-size: 0.85rem;
    color: var(--green);
    font-weight: 700;
  }

  /* Footer strip */
  .tag-footer {
    background: #F9FBF9;
    border-top: 1px solid var(--border);
    padding: 0.7rem 1.4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tag-tagline {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--green);
    letter-spacing: 0.02em;
    font-style: italic;
  }

  .tag-qr-placeholder {
    width: 32px; height: 32px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    padding: 4px;
  }
  .tag-qr-placeholder span {
    background: var(--green);
    border-radius: 1px;
    opacity: 0.4;
  }
  .tag-qr-placeholder span:nth-child(2) { opacity: 0.2; }
  .tag-qr-placeholder span:nth-child(3) { opacity: 0.15; }

  /* Side accent bar */
  .tag-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--amber), var(--green));
    display: none;
  }
</style>
</head>
<body>

<header>
  <img src="assets/logo-icon.png"
     style="width:22px;height:22px;object-fit:contain;">
  <span class="logo-text">TradeFlow NG</span>
  <span class="logo-tag">Agent Tag Generator</span>
</header>

<main>

  <!-- LEFT — Form -->
  <div class="form-panel">
    <div class="panel-title">Agent Information</div>

    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="inp-name" placeholder="e.g. Aminu Bello" maxlength="40">
    </div>

    <div class="form-group">
      <label>Agent ID *</label>
      <input type="text" id="inp-id" placeholder="e.g. TFN-OY-001" maxlength="20">
      <p class="input-hint">Format: TFN-[State Code]-[Number] e.g. TFN-KW-003</p>
    </div>

    <div class="form-group">
      <label>State</label>
      <select id="inp-state">
        <option value="">Select state</option>
        <option>Lagos</option>
        <option>Oyo</option>
        <option>Ogun</option>
        <option>Kwara</option>
        <option>Kogi</option>
        <option>Abuja (FCT)</option>
        <option>Nasarawa</option>
        <option>Niger</option>
      </select>
    </div>

    <div class="form-group">
      <label>Assigned Market *</label>
      <input type="text" id="inp-market" placeholder="e.g. Bodija Market, Ibadan" maxlength="50">
    </div>

    <div class="form-group">
      <label>Phone Number *</label>
      <input type="tel" id="inp-phone" placeholder="e.g. 08012345678" maxlength="14">
    </div>

    <div class="form-group">
      <label>Agent Role</label>
      <select id="inp-role">
        <option value="Market Agent">Market Agent</option>
        <option value="State Coordinator">State Coordinator</option>
        <option value="Spot Reporter">Spot Reporter</option>
      </select>
    </div>

    <div class="form-group">
      <label>Issue Date</label>
      <input type="date" id="inp-date">
    </div>

    <button class="btn-generate" onclick="generateTag()">Generate Tag →</button>
    <button class="btn-download" id="btn-dl" onclick="downloadTag()">⬇ Download as PNG</button>
  </div>

  <!-- RIGHT — Preview -->
  <div class="preview-panel">
    <div class="panel-title">Tag Preview</div>

    <div class="preview-wrap">

      <!-- Empty state -->
      <div class="empty-state" id="empty-msg">
        <div class="icon">🪪</div>
        Fill in the agent details<br>and click Generate Tag
      </div>

      <!-- The actual tag -->
      <div id="agent-tag">
        <div class="tag-accent"></div>

        <!-- Green header -->
        <div class="tag-header">
          <div class="tag-brand">
            <div class="tag-logo-mark">🌾</div>
            <div>
              <div class="tag-brand-name">TradeFlow <span>NG</span></div>
            </div>
          </div>
          <div class="tag-role-badge" id="tag-role-out">Market Agent</div>
        </div>

        <!-- Body -->
        <div class="tag-body">
          <div class="tag-name" id="tag-name-out">—</div>
          <div class="tag-market">
            <span>📍</span>
            <span id="tag-market-out">—</span>
          </div>

          <div class="tag-divider"></div>

          <div class="tag-details">
            <div class="tag-detail-item">
              <span class="tag-detail-label">Agent ID</span>
              <span class="tag-detail-value id-value" id="tag-id-out">—</span>
            </div>
            <div class="tag-detail-item">
              <span class="tag-detail-label">State</span>
              <span class="tag-detail-value" id="tag-state-out">—</span>
            </div>
            <div class="tag-detail-item">
              <span class="tag-detail-label">Phone</span>
              <span class="tag-detail-value" id="tag-phone-out">—</span>
            </div>
            <div class="tag-detail-item">
              <span class="tag-detail-label">Issued</span>
              <span class="tag-detail-value" id="tag-date-out">—</span>
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="tag-footer">
          <span class="tag-tagline">Flowing Trade. Feeding Nigeria.</span>
          <div class="tag-qr-placeholder">
            <span></span><span></span>
            <span></span><span></span>
          </div>
        </div>
      </div>

    </div>
  </div>

</main>

<script>
  // Pre-fill today's date
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];

  function generateTag() {
    const name   = document.getElementById('inp-name').value.trim();
    const id     = document.getElementById('inp-id').value.trim();
    const market = document.getElementById('inp-market').value.trim();
    const phone  = document.getElementById('inp-phone').value.trim();
    const state  = document.getElementById('inp-state').value;
    const role   = document.getElementById('inp-role').value;
    const date   = document.getElementById('inp-date').value;

    if (!name || !id || !market || !phone) {
      alert('Please fill in Name, Agent ID, Market, and Phone Number.');
      return;
    }

    // Populate tag
    document.getElementById('tag-name-out').textContent   = name;
    document.getElementById('tag-id-out').textContent     = id;
    document.getElementById('tag-market-out').textContent = market;
    document.getElementById('tag-phone-out').textContent  = phone;
    document.getElementById('tag-state-out').textContent  = state || '—';
    document.getElementById('tag-role-out').textContent   = role;
    document.getElementById('tag-date-out').textContent   = date
      ? new Date(date + 'T00:00:00').toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})
      : '—';

    // Show tag, hide empty state, show download button
    document.getElementById('empty-msg').style.display  = 'none';
    document.getElementById('agent-tag').classList.add('visible');
    document.getElementById('btn-dl').classList.add('visible');
  }

  function downloadTag() {
    const tag = document.getElementById('agent-tag');
    const name = document.getElementById('inp-name').value.trim() || 'agent';
    const id   = document.getElementById('inp-id').value.trim() || 'tag';

    html2canvas(tag, {
      scale: 3,           // High resolution for printing
      useCORS: true,
      backgroundColor: '#FFFFFF',
      logging: false,
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = `TradeFlowNG_Tag_${id}_${name.replace(/\s+/g,'-')}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  }

  // Live preview on Enter
  document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') generateTag();
    });
  });
</script>
</body>
</html>
