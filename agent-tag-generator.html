<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Tag Generator — TradeFlow NG</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F5F2EB;color:#1C1C1C;min-height:100vh;-webkit-font-smoothing:antialiased;}
header{background:#0D1F14;padding:1.3rem 2rem;display:flex;align-items:center;gap:.75rem;}

/* Updated Header Logo */
.hmark{width:36px;height:36px;background:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid #1A6B3C;}
.hmark img{width:100%;height:100%;object-fit:cover;}

.hname{font-size:1rem;font-weight:700;color:#fff;}
.hbadge{margin-left:auto;font-size:.7rem;font-weight:700;color:#C8860A;background:rgba(200,134,10,.12);border:1px solid rgba(200,134,10,.25);padding:.25rem .75rem;border-radius:100px;text-transform:uppercase;letter-spacing:.05em;}
main{max-width:1080px;margin:0 auto;padding:3rem 2rem 5rem;display:grid;grid-template-columns:280px 1fr;gap:3rem;align-items:start;}
@media(max-width:760px){main{grid-template-columns:1fr;}}
.plbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#6B7A70;margin-bottom:1.4rem;}
.fg{margin-bottom:1.1rem;}
label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.38rem;}
input,select{width:100%;padding:.78rem .95rem;border:1.5px solid rgba(26,107,60,.16);border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;color:#1C1C1C;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus{border-color:#1A6B3C;box-shadow:0 0 0 3px rgba(26,107,60,.08);}
.bgen{width:100%;margin-top:.4rem;padding:.88rem;background:#1A6B3C;color:#fff;border:none;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;}
.bgen:hover{background:#2E8B57;transform:translateY(-1px);}
.bdl{width:100%;margin-top:.7rem;padding:.82rem;background:transparent;color:#C8860A;border:1.5px solid #C8860A;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;display:none;}
.bdl:hover{background:#C8860A;color:#fff;}
.bdl:disabled{opacity:.6;cursor:not-allowed;}
.pscroll{overflow-x:auto;background:#E8E5DC;border-radius:14px;border:1px solid rgba(26,107,60,.12);padding:2rem;display:flex;justify-content:center;align-items:center;min-height:300px;box-shadow:inset 0 2px 8px rgba(0,0,0,.06);}
.est{text-align:center;color:#6B7A70;font-size:.86rem;line-height:1.65;}
.est .ei{font-size:2.2rem;display:block;margin-bottom:.5rem;}

/* ── TAG STYLES ── */
#tag{width:320px;background:#fff;border-radius:16px;overflow:hidden;position:relative;display:none;box-shadow:0 10px 30px rgba(0,0,0,.1);border:1px solid #E8E5DC;}
#tag.show{display:block;}
.t-head{background:#1A6B3C;padding:1.5rem;text-align:center;color:#fff;position:relative;}

/* Updated Tag Logo */
.t-logo{width:60px;height:60px;background:#fff;border-radius:12px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid #C8860A;}
.t-logo img{width:100%;height:100%;object-fit:cover;}

.t-title{font-size:1.2rem;font-weight:800;letter-spacing:.02em;}
.t-sub{font-size:.7rem;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.1em;margin-top:.2rem;}
.t-body{padding:1.8rem 1.5rem;}
.t-role{text-align:center;color:#C8860A;font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;}
.t-name{text-align:center;font-size:1.4rem;font-weight:800;color:#0D1F14;margin-bottom:1.5rem;line-height:1.2;}
.t-info{display:flex;flex-direction:column;gap:1rem;}
.ti-row{display:flex;flex-direction:column;gap:.2rem;}
.ti-lbl{font-size:.65rem;font-weight:700;color:#6B7A70;text-transform:uppercase;letter-spacing:.08em;}
.ti-val{font-size:.9rem;font-weight:600;color:#1C1C1C;}
.ti-val.mono{font-family:'DM Mono',monospace;color:#1A6B3C;}
.t-foot{background:#F5F2EB;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #E8E5DC;}
.tf-lbl{font-size:.6rem;font-weight:600;color:#6B7A70;text-transform:uppercase;}
.tf-val{font-size:.75rem;font-weight:700;color:#1C1C1C;}
</style>
</head>
<body>
<header>
  <div class="hmark"><img src="585899.jpg" alt="Logo"></div>
  <span class="hname">TradeFlow NG</span>
  <span class="hbadge">Agent Tag Generator</span>
</header>
<main>
  <div>
    <div class="plbl">Agent Details</div>
    <div class="fg"><label>Full Name *</label><input type="text" id="fn" placeholder="e.g. Ibrahim Musa" maxlength="40"></div>
    <div class="fg"><label>Agent ID *</label><input type="text" id="fi" placeholder="e.g. TFN-LAG-001" maxlength="20"></div>
    <div class="fg"><label>Role</label><input type="text" id="role" placeholder="e.g. Field Agent" value="Field Agent"></div>
    <div class="fg"><label>State</label><input type="text" id="st" placeholder="e.g. Lagos"></div>
    <div class="fg"><label>Market / Zone</label><input type="text" id="mkt" placeholder="e.g. Mile 12 Market"></div>
    <div class="fg"><label>Phone Number</label><input type="text" id="ph" placeholder="e.g. 08012345678"></div>
    <div class="fg"><label>Issue Date</label><input type="date" id="fd"></div>
    <button class="bgen" onclick="gen()">Generate Tag →</button>
    <button class="bdl" id="bdl" onclick="dl()">⬇ Download PNG</button>
  </div>

  <div>
    <div class="plbl">Preview</div>
    <div class="pscroll">
      <div class="est" id="est"><span class="ei">🪪</span>Enter details and click<br>Generate Tag</div>

      <div id="tag">
        <div class="t-head">
          <div class="t-logo"><img src="585899.jpg" alt="Logo" crossorigin="anonymous"></div>
          <div class="t-title">TRADEFLOW NG</div>
          <div class="t-sub">Official Representative</div>
        </div>
        
        <div class="t-body">
          <div class="t-role" id="or">Field Agent</div>
          <div class="t-name" id="oname">Agent Name</div>
          
          <div class="t-info">
            <div class="ti-row">
              <span class="ti-lbl">Agent ID</span>
              <span class="ti-val mono" id="oid">TFN-000</span>
            </div>
            <div class="ti-row">
              <span class="ti-lbl">Assigned Market/Zone</span>
              <span class="ti-val" id="om">📍 Market</span>
            </div>
            <div class="ti-row" style="display:flex;flex-direction:row;justify-content:space-between;gap:1rem;">
              <div style="flex:1;">
                <span class="ti-lbl">State</span>
                <div class="ti-val" id="os">State</div>
              </div>
              <div style="flex:1;">
                <span class="ti-lbl">Phone</span>
                <div class="ti-val" id="op">Phone</div>
              </div>
            </div>
          </div>
        </div>
        
        <div class="t-foot">
          <div>
            <div class="tf-lbl">Issued</div>
            <div class="tf-val" id="od">Date</div>
          </div>
          <div style="text-align:right;">
            <div class="tf-lbl">Status</div>
            <div class="tf-val" style="color:#1A6B3C;">ACTIVE</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
document.getElementById('fd').value = new Date().toISOString().split('T')[0];

function gen(){
  const name = document.getElementById('fn').value.trim();
  const id   = document.getElementById('fi').value.trim();
  const mkt  = document.getElementById('mkt').value.trim() || '—';
  const ph   = document.getElementById('ph').value.trim() || '—';
  const st   = document.getElementById('st').value.trim();
  const role = document.getElementById('role').value.trim() || 'Field Agent';
  const dt   = document.getElementById('fd').value;
  
  if(!name||!id){alert('Please fill in Full Name and Agent ID.');return;}
  
  document.getElementById('oname').textContent = name;
  document.getElementById('oid').textContent   = id;
  document.getElementById('om').textContent    = '📍 ' + mkt;
  document.getElementById('op').textContent    = ph;
  document.getElementById('os').textContent    = st || '—';
  document.getElementById('or').textContent    = role;
  document.getElementById('od').textContent    = dt ? new Date(dt+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
  
  document.getElementById('est').style.display = 'none';
  document.getElementById('tag').classList.add('show');
  document.getElementById('bdl').style.display = 'block';
}

function dl(){
  const el   = document.getElementById('tag');
  const name = document.getElementById('fn').value.trim() || 'agent';
  const id   = document.getElementById('fi').value.trim() || 'tag';
  const btn  = document.getElementById('bdl');
  
  btn.textContent = 'Generating…'; 
  btn.disabled = true;

  // Render delay added to fix the freeze issue
  setTimeout(() => {
    html2canvas(el, {
      scale: 3, 
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#ffffff'
    })
    .then(canvas => {
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url;
      a.download = 'TFN_Tag_' + id + '_' + name.replace(/\s+/g,'-') + '.png';
      document.body.appendChild(a); 
      a.click(); 
      document.body.removeChild(a);
      
      btn.textContent = '⬇ Download PNG'; 
      btn.disabled = false;
    })
    .catch(e => {
      console.error(e);
      alert('Download failed. Please check the console for errors.');
      btn.textContent = '⬇ Download PNG'; 
      btn.disabled = false;
    });
  }, 500);
}

document.querySelectorAll('input').forEach(el=>{
  el.addEventListener('keydown',e=>{ if(e.key==='Enter') gen(); });
});
</script>
</body>
</html>
